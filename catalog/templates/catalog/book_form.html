{% extends "catalog/base.html" %}

{% block title %}Formulario de libro{% endblock %}

{% block content %}

    <h1>{% if object %}Editar libro{% else %}Nuevo libro{% endif %}</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'book-list' %}">Cancelar</a>

{% endblock %}
